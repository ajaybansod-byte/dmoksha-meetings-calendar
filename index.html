<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>D'Moksha Meetings Calendar</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23ffffff'/%3E%3Ctext x='50' y='62' text-anchor='middle' font-family='serif' font-weight='bold' font-size='42' fill='%23111827'%3ED%3C/text%3E%3C/svg%3E" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
  body { background: #f8fafc; font-family: "Google Sans", "Segoe UI", Roboto, system-ui, -apple-system, sans-serif; color: #1f2937; }
  /* Prevent any input from forcing horizontal overflow on mobile */
  input, select, textarea, button { box-sizing: border-box; max-width: 100%; }
  .scrollbar-thin::-webkit-scrollbar { width: 8px; height: 8px; }
  .scrollbar-thin::-webkit-scrollbar-track { background: #f1f5f9; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { animation: spin 0.7s linear infinite; }
  .shadow-soft { box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06), 0 1px 3px rgba(15, 23, 42, 0.05); }
  .shadow-card { box-shadow: 0 2px 6px rgba(15, 23, 42, 0.08); }
  /* iOS safe-area padding for sticky bottom bars */
  .pb-safe { padding-bottom: max(env(safe-area-inset-bottom, 0px), 0.75rem); }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .animate-slide-up { animation: slideUp 0.22s ease-out; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo } = React;

// === Supabase config (publishable / anon key — safe for frontend) ===
const SUPABASE_URL = "https://pncdmkqhfclymmyldmas.supabase.co";
const SUPABASE_KEY = "sb_publishable_Mm7ImJtTtEQIAR9KK1DLzw_QGkhptKA";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// === Meeting-type color palette ===
const meetingColor = (type) => {
  const t = (type || "").toLowerCase();
  if (t.startsWith("1")) return { chipBg: "bg-yellow-300",  text: "text-yellow-900", border: "border-yellow-400", barBg: "bg-yellow-300",  barText: "text-yellow-900", dot: "bg-yellow-400" };
  if (t.startsWith("2")) return { chipBg: "bg-orange-400",  text: "text-orange-950", border: "border-orange-500", barBg: "bg-orange-400",  barText: "text-orange-950", dot: "bg-orange-500" };
  if (t.startsWith("3")) return { chipBg: "bg-red-500",     text: "text-white",      border: "border-red-600",    barBg: "bg-red-500",     barText: "text-white", dot: "bg-red-500" };
  if (t.startsWith("4")) return { chipBg: "bg-rose-700",    text: "text-white",      border: "border-rose-800",   barBg: "bg-rose-700",    barText: "text-white", dot: "bg-rose-700" };
  if (t.startsWith("5")) return { chipBg: "bg-purple-700",  text: "text-white",      border: "border-purple-800", barBg: "bg-purple-700",  barText: "text-white", dot: "bg-purple-700" };
  return { chipBg: "bg-gray-300", text: "text-gray-900", border: "border-gray-400", barBg: "bg-gray-300", barText: "text-gray-900", dot: "bg-gray-400" };
};

const MEETING_TYPES = ["1st Meeting", "2nd Meeting", "3rd Meeting", "4th Meeting", "5th Meeting"];
const STATUSES = ["Converted", "Dropped", "Ongoing", "Estimate sent", "Estimate Pending", "2nd meeting pending", "Office visit"];
const RECORDING_OPTS = ["Yes", "No"];

// === Date helpers ===
const pad = (n) => String(n).padStart(2, "0");
const toISO = (d) => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const monthName = (i) => ["January","February","March","April","May","June","July","August","September","October","November","December"][i];
const shortMonth = (i) => ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][i];
const fullDayName = (d) => ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][d.getDay()];

// === D'Moksha Logo ===
const Logo = ({ className = "h-10", fill = "#111827" }) => (
  <svg viewBox="0 0 240 64" xmlns="http://www.w3.org/2000/svg" className={className} preserveAspectRatio="xMidYMid meet">
    <text x="120" y="36" textAnchor="middle" fontFamily="serif" fontWeight="700" fontSize="30" fill={fill} letterSpacing="2">D'MOKSHA</text>
    <text x="120" y="56" textAnchor="middle" fontFamily="sans-serif" fontWeight="300" fontSize="14" fill={fill} letterSpacing="6">HOMES</text>
  </svg>
);

// =========================================================
//                         App
// =========================================================
const EMPTY_FILTERS = { designer: "", type: "", status: "", q: "" };

function App() {
  const [view, setView] = useState("calendar");
  const [meetings, setMeetings] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  const [cursor, setCursor] = useState(() => {
    const t = new Date();
    return new Date(t.getFullYear(), t.getMonth(), 1);
  });

  const [selectedDate, setSelectedDate] = useState(null);
  const [editing, setEditing] = useState(null);
  const [filters, setFilters] = useState(EMPTY_FILTERS);

  const loadMeetings = async () => {
    setLoading(true);
    setError(null);
    const { data, error } = await supabase
      .from("designer_meetings")
      .select("*")
      .order("meeting_date", { ascending: true });
    if (error) { setError(error.message); setLoading(false); return; }
    setMeetings(data || []);
    setLoading(false);
  };

  useEffect(() => { loadMeetings(); }, []);

  const filteredMeetings = useMemo(() => {
    const q = (filters.q || "").toLowerCase();
    return meetings.filter(m => {
      if (filters.designer && m.designer_name !== filters.designer) return false;
      if (filters.type && m.meeting_type !== filters.type) return false;
      if (filters.status && m.status !== filters.status) return false;
      if (q) {
        const hay = [m.customer_name, m.area, m.remarks, m.sj, m.support_name, m.mobile_number]
          .filter(Boolean).join(" ").toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
  }, [meetings, filters]);

  const meetingsByDate = useMemo(() => {
    const map = {};
    for (const m of filteredMeetings) {
      (map[m.meeting_date] = map[m.meeting_date] || []).push(m);
    }
    return map;
  }, [filteredMeetings]);

  const goToday = () => {
    const t = new Date();
    setCursor(new Date(t.getFullYear(), t.getMonth(), 1));
  };
  const prevMonth = () => setCursor(new Date(cursor.getFullYear(), cursor.getMonth()-1, 1));
  const nextMonth = () => setCursor(new Date(cursor.getFullYear(), cursor.getMonth()+1, 1));

  // handleSave now THROWS on error so the modal can catch and show inline.
  const handleSave = async (rec) => {
    const payload = { ...rec };
    delete payload.id;
    delete payload.created_at;
    delete payload.updated_at;
    if (payload.windows === "" || payload.windows === null) payload.windows = null;
    else payload.windows = Number(payload.windows);
    Object.keys(payload).forEach(k => { if (payload[k] === "") payload[k] = null; });

    if (rec.id) {
      const { error } = await supabase.from("designer_meetings").update(payload).eq("id", rec.id);
      if (error) throw new Error(error.message || "Supabase update failed");
    } else {
      const { error } = await supabase.from("designer_meetings").insert(payload);
      if (error) throw new Error(error.message || "Supabase insert failed");
    }
    setEditing(null);
    await loadMeetings();
  };

  const handleDelete = async (id) => {
    if (!confirm("Delete this meeting? This cannot be undone.")) return;
    const { error } = await supabase.from("designer_meetings").delete().eq("id", id);
    if (error) throw new Error(error.message || "Delete failed");
    setEditing(null);
    await loadMeetings();
  };

  return (
    <div className="min-h-screen bg-slate-50 text-gray-900">
      <Header view={view} setView={setView} onAddNew={() => setEditing({ meeting_date: toISO(new Date()), meeting_type: "1st Meeting" })} />

      {loading && (
        <div className="flex items-center justify-center py-24">
          <div className="spinner h-10 w-10 border-4 border-blue-500 border-t-transparent rounded-full" />
        </div>
      )}
      {error && (
        <div className="max-w-3xl mx-auto mt-6 p-4 rounded-lg bg-red-50 border border-red-200 text-red-800">
          Error: {error}
        </div>
      )}

      {!loading && !error && (
        <main className="max-w-7xl mx-auto px-3 sm:px-6 py-4 sm:py-6">
          <FilterBar
            meetings={meetings}
            filters={filters}
            setFilters={setFilters}
            totalCount={meetings.length}
            filteredCount={filteredMeetings.length}
          />

          {view === "calendar" ? (
            <CalendarView
              cursor={cursor}
              onPrev={prevMonth}
              onNext={nextMonth}
              onToday={goToday}
              meetingsByDate={meetingsByDate}
              onSelectDate={(d) => setSelectedDate(d)}
            />
          ) : (
            <ListView meetings={filteredMeetings} onEdit={(m) => setEditing(m)} />
          )}
          <Legend />
        </main>
      )}

      {selectedDate && (
        <DayPanel
          date={selectedDate}
          meetings={meetingsByDate[selectedDate] || []}
          onClose={() => setSelectedDate(null)}
          onEdit={(m) => { setSelectedDate(null); setEditing(m); }}
          onAdd={() => { setSelectedDate(null); setEditing({ meeting_date: selectedDate, meeting_type: "1st Meeting" }); }}
        />
      )}

      {editing && (
        <EditModal
          record={editing}
          onClose={() => setEditing(null)}
          onSave={handleSave}
          onDelete={handleDelete}
        />
      )}

      <Footer />
    </div>
  );
}

// =========================================================
//                       Header
// =========================================================
function Header({ view, setView, onAddNew }) {
  return (
    <header className="bg-white border-b border-gray-200 shadow-soft sticky top-0 z-30">
      <div className="max-w-7xl mx-auto px-3 sm:px-6 py-3 flex flex-row items-center gap-3 justify-between">
        <div className="flex items-center gap-2 sm:gap-4 min-w-0">
          <Logo className="h-8 sm:h-10 shrink-0" />
          <div className="hidden sm:block w-px h-8 bg-gray-200" />
          <div className="hidden md:block">
            <div className="text-lg font-semibold text-gray-900">Meetings Calendar</div>
            <div className="text-xs text-gray-500">Designer appointments &amp; visits</div>
          </div>
        </div>
        <div className="flex items-center gap-2 shrink-0">
          <div className="flex rounded-full overflow-hidden border border-gray-300 bg-gray-50">
            <button onClick={() => setView("calendar")} className={`px-3 sm:px-4 py-2 text-xs sm:text-sm font-medium transition ${view === "calendar" ? "bg-blue-600 text-white" : "text-gray-700 hover:bg-gray-100"}`}>Calendar</button>
            <button onClick={() => setView("list")} className={`px-3 sm:px-4 py-2 text-xs sm:text-sm font-medium transition ${view === "list" ? "bg-blue-600 text-white" : "text-gray-700 hover:bg-gray-100"}`}>List</button>
          </div>
          <button onClick={onAddNew} className="px-3 sm:px-4 py-2 rounded-full bg-blue-600 hover:bg-blue-700 text-white text-xs sm:text-sm font-semibold shadow-soft whitespace-nowrap">
            <span className="sm:hidden">+ New</span>
            <span className="hidden sm:inline">+ New Meeting</span>
          </button>
        </div>
      </div>
    </header>
  );
}

// =========================================================
//                       Filter Bar
// =========================================================
function FilterBar({ meetings, filters, setFilters, totalCount, filteredCount }) {
  const designers = useMemo(
    () => Array.from(new Set(meetings.map(m => m.designer_name).filter(Boolean))).sort(),
    [meetings]
  );
  const activeCount = ["designer", "type", "status", "q"].filter(k => filters[k]).length;
  const clear = () => setFilters({ designer: "", type: "", status: "", q: "" });

  return (
    <div className="bg-white border border-gray-200 rounded-xl shadow-soft p-2 sm:p-3 mb-4 sm:mb-5">
      <div className="flex flex-wrap items-center gap-2">
        <span className="hidden sm:inline text-xs font-semibold text-gray-500 uppercase tracking-wider mr-1">Filter</span>
        <select
          value={filters.designer}
          onChange={e => setFilters({ ...filters, designer: e.target.value })}
          className="bg-white border border-gray-300 rounded-md px-2 sm:px-3 py-1.5 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
          <option value="">All designers</option>
          {designers.map(d => <option key={d} value={d}>{d}</option>)}
        </select>
        <select
          value={filters.type}
          onChange={e => setFilters({ ...filters, type: e.target.value })}
          className="bg-white border border-gray-300 rounded-md px-2 sm:px-3 py-1.5 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
          <option value="">All meeting types</option>
          {MEETING_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
        </select>
        <select
          value={filters.status}
          onChange={e => setFilters({ ...filters, status: e.target.value })}
          className="bg-white border border-gray-300 rounded-md px-2 sm:px-3 py-1.5 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
          <option value="">All statuses</option>
          {STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
        </select>
        <div className="flex-1 min-w-[160px] relative">
          <svg className="absolute left-2.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-4.35-4.35M11 18a7 7 0 100-14 7 7 0 000 14z" /></svg>
          <input
            value={filters.q}
            onChange={e => setFilters({ ...filters, q: e.target.value })}
            placeholder="Search…"
            className="w-full bg-white border border-gray-300 rounded-md pl-8 pr-3 py-1.5 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
          />
        </div>
        {activeCount > 0 && (
          <button onClick={clear} className="px-3 py-1.5 rounded-md bg-gray-100 hover:bg-gray-200 text-sm border border-gray-300 text-gray-700">Clear ({activeCount})</button>
        )}
        <span className="text-xs sm:text-sm text-gray-500 ml-auto sm:ml-1 w-full sm:w-auto text-right sm:text-left">
          {filteredCount === totalCount
            ? `${totalCount} meetings`
            : `${filteredCount} of ${totalCount}`}
        </span>
      </div>
    </div>
  );
}

// =========================================================
//                     Calendar View
// =========================================================
function CalendarView({ cursor, onPrev, onNext, onToday, meetingsByDate, onSelectDate }) {
  const year = cursor.getFullYear();
  const month = cursor.getMonth();
  const firstDay = new Date(year, month, 1);
  const startWeekday = firstDay.getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  const cells = [];
  for (let i = 0; i < startWeekday; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  const todayISO = toISO(new Date());

  return (
    <section>
      <div className="flex flex-row items-center justify-between gap-3 mb-3 sm:mb-4">
        <h2 className="text-lg sm:text-2xl font-normal text-gray-900">
          <span className="font-semibold">{monthName(month)}</span>{" "}
          <span className="text-gray-600">{year}</span>
        </h2>
        <div className="flex items-center gap-1.5 sm:gap-2">
          <button onClick={onToday} className="px-3 py-1.5 rounded-md bg-white hover:bg-gray-50 text-sm border border-gray-300 text-gray-700 font-medium">Today</button>
          <button onClick={onPrev} title="Previous month" className="w-9 h-9 inline-flex items-center justify-center rounded-full hover:bg-gray-100 text-gray-700">
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7" /></svg>
          </button>
          <button onClick={onNext} title="Next month" className="w-9 h-9 inline-flex items-center justify-center rounded-full hover:bg-gray-100 text-gray-700">
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7" /></svg>
          </button>
        </div>
      </div>

      <div className="bg-white border border-gray-200 rounded-xl overflow-hidden shadow-card">
        <div className="grid grid-cols-7 border-b border-gray-200 bg-gray-50">
          {["S","M","T","W","T","F","S"].map((d, i) => (
            <div key={i} className="text-gray-500 text-[11px] font-semibold text-center py-2 tracking-wider">
              <span className="sm:hidden">{d}</span>
              <span className="hidden sm:inline">{["SUN","MON","TUE","WED","THU","FRI","SAT"][i]}</span>
            </div>
          ))}
        </div>
        <div className="grid grid-cols-7">
          {cells.map((d, i) => {
            if (d === null) return <div key={i} className="bg-gray-50/40 min-h-[64px] sm:min-h-[118px] border-t border-r border-gray-100 last:border-r-0" />;
            const dateISO = toISO(new Date(year, month, d));
            const dayMeetings = meetingsByDate[dateISO] || [];
            const isToday = dateISO === todayISO;
            const colStart = i % 7;
            return (
              <DayCell
                key={i}
                day={d}
                isToday={isToday}
                meetings={dayMeetings}
                hasRightBorder={colStart < 6}
                onClick={() => onSelectDate(dateISO)}
              />
            );
          })}
        </div>
      </div>
    </section>
  );
}

function DayCell({ day, isToday, meetings, hasRightBorder, onClick }) {
  // Aggregate dot rendering: keep order but cap displayed dots
  const MAX_DOTS = 6;
  const dotsShown = meetings.slice(0, MAX_DOTS);
  const dotOverflow = Math.max(0, meetings.length - MAX_DOTS);

  return (
    <button
      onClick={onClick}
      className={`bg-white hover:bg-blue-50/40 active:bg-blue-50 transition-colors min-h-[64px] sm:min-h-[118px] p-1 sm:p-1.5 text-left flex flex-col border-t border-gray-100 ${hasRightBorder ? "border-r" : ""}`}
    >
      <div className="flex items-center justify-between mb-1">
        {isToday ? (
          <div className="w-6 h-6 rounded-full bg-blue-600 text-white text-xs font-semibold flex items-center justify-center">{day}</div>
        ) : (
          <div className="text-xs font-medium text-gray-700 px-1">{day}</div>
        )}
        {/* Mobile-only meeting count badge */}
        {meetings.length > 0 && (
          <span className="sm:hidden text-[10px] font-semibold text-gray-500 pr-0.5">{meetings.length}</span>
        )}
      </div>

      {/* MOBILE: row of colored dots */}
      <div className="sm:hidden flex flex-wrap items-center gap-0.5 mt-auto">
        {dotsShown.map((m, idx) => {
          const c = meetingColor(m.meeting_type);
          return <span key={idx} className={`w-1.5 h-1.5 rounded-full ${c.dot}`} />;
        })}
        {dotOverflow > 0 && (
          <span className="text-[9px] text-gray-500 leading-none ml-0.5">+{dotOverflow}</span>
        )}
      </div>

      {/* DESKTOP: chip previews */}
      <div className="hidden sm:flex flex-col gap-1 overflow-hidden">
        {meetings.slice(0, 3).map(m => {
          const c = meetingColor(m.meeting_type);
          return (
            <div key={m.id} className={`${c.chipBg} ${c.text} rounded px-1.5 py-0.5 text-[10px] leading-tight`} title={`${m.designer_name || ""} – ${m.customer_name || ""}`}>
              <div className="font-semibold truncate">{m.designer_name || "—"} · {m.customer_name || "—"}</div>
              <div className="truncate opacity-90">{m.area || "—"} · {m.timing || "—"} · {m.windows ? `${m.windows}w` : "—"}</div>
            </div>
          );
        })}
        {meetings.length > 3 && (
          <div className="text-[10px] text-blue-600 font-semibold pl-1">+ {meetings.length - 3} more</div>
        )}
      </div>
    </button>
  );
}

// =========================================================
//                         Legend
// =========================================================
function Legend() {
  const items = [
    { label: "1st", c: "bg-yellow-300" },
    { label: "2nd", c: "bg-orange-400" },
    { label: "3rd", c: "bg-red-500" },
    { label: "4th", c: "bg-rose-700" },
    { label: "5th+", c: "bg-purple-700" },
  ];
  return (
    <div className="mt-4 sm:mt-5 flex flex-wrap gap-2 sm:gap-3 text-xs text-gray-600">
      <span className="font-semibold text-gray-700">Color key:</span>
      {items.map(i => (
        <span key={i.label} className="inline-flex items-center gap-1.5">
          <span className={`w-3 h-3 rounded ${i.c} inline-block border border-gray-300`} /> {i.label} Meeting
        </span>
      ))}
    </div>
  );
}

// =========================================================
//                       Day Panel
// =========================================================
function DayPanel({ date, meetings, onClose, onEdit, onAdd }) {
  const d = new Date(date + "T00:00:00");
  return (
    <div className="fixed inset-0 z-40 bg-gray-900/40 flex sm:justify-end items-end sm:items-stretch" onClick={onClose}>
      <div
        className="bg-white w-full sm:max-w-xl h-[88vh] sm:h-full rounded-t-2xl sm:rounded-none overflow-y-auto scrollbar-thin border-l border-gray-200 animate-slide-up sm:animate-none flex flex-col"
        onClick={e => e.stopPropagation()}>
        {/* Drag handle (mobile) */}
        <div className="sm:hidden flex justify-center pt-2 pb-1">
          <div className="w-10 h-1 bg-gray-300 rounded-full" />
        </div>

        <div className="sticky top-0 bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between gap-2">
          <div className="min-w-0">
            <div className="text-xs text-blue-600 uppercase tracking-wider font-semibold">{fullDayName(d)}</div>
            <div className="text-lg sm:text-xl font-semibold text-gray-900">{shortMonth(d.getMonth())} {d.getDate()}, {d.getFullYear()}</div>
            <div className="text-xs text-gray-500">{meetings.length} meeting{meetings.length !== 1 ? "s" : ""}</div>
          </div>
          <div className="flex items-center gap-2 shrink-0">
            <button onClick={onAdd} className="px-3 py-2 rounded-md bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold whitespace-nowrap">+ Add</button>
            <button onClick={onClose} aria-label="Close" className="w-9 h-9 rounded-full hover:bg-gray-100 text-gray-500 hover:text-gray-900 text-2xl leading-none inline-flex items-center justify-center">×</button>
          </div>
        </div>

        <div className="p-3 sm:p-4 space-y-3 pb-safe flex-1">
          {meetings.length === 0 && (
            <div className="text-center py-12 text-gray-500">
              <div className="text-4xl mb-2">📅</div>
              <div>No meetings on this day.</div>
              <button onClick={onAdd} className="mt-4 px-4 py-2 rounded-md bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold">Add Meeting</button>
            </div>
          )}
          {meetings.map(m => <MeetingCard key={m.id} meeting={m} onEdit={onEdit} />)}
        </div>
      </div>
    </div>
  );
}

function MeetingCard({ meeting: m, onEdit }) {
  const c = meetingColor(m.meeting_type);
  const [expanded, setExpanded] = useState(false);

  return (
    <div className={`rounded-lg border ${c.border} bg-white overflow-hidden shadow-soft`}>
      <div className={`${c.barBg} ${c.barText} px-3 py-1.5 flex items-center justify-between text-sm`}>
        <span className="font-semibold">{m.meeting_type || "—"}</span>
        <span className="text-xs">{m.timing || "—"}</span>
      </div>

      {/* Summary always visible */}
      <button
        onClick={() => setExpanded(v => !v)}
        className="w-full text-left p-3 hover:bg-gray-50 active:bg-gray-100">
        <div className="font-semibold text-gray-900">{m.customer_name || "—"}</div>
        <div className="text-xs text-gray-600 mt-0.5">
          {m.designer_name || "—"} · {m.area || "—"}{m.windows ? ` · ${m.windows}w` : ""}
        </div>
        {m.mobile_number && (
          <div className="text-xs text-gray-500 mt-0.5">
            <a href={`tel:${m.mobile_number}`} onClick={e => e.stopPropagation()} className="text-blue-600 underline">{m.mobile_number}</a>
          </div>
        )}
      </button>

      {/* Expanded details */}
      {expanded && (
        <div className="px-3 pb-3 border-t border-gray-100 pt-3 grid grid-cols-1 sm:grid-cols-2 gap-x-3 gap-y-2 text-sm">
          <Field label="Support">{m.support_name || "—"}</Field>
          <Field label="Status">{m.status || "—"}</Field>
          <Field label="Scheduled by">{m.scheduled_by || "—"}</Field>
          <Field label="Recording">{m.recording || "—"}</Field>
          {m.recording_reason && <Field label="Reason (no rec.)" wide>{m.recording_reason}</Field>}
          {m.remarks && <Field label="Remarks" wide>{m.remarks}</Field>}
          {m.sj && <Field label="Sales Journal" wide>{m.sj}</Field>}
        </div>
      )}

      <div className="px-3 pb-3 flex gap-2">
        <button
          onClick={() => setExpanded(v => !v)}
          className="px-3 py-2 rounded-md bg-white hover:bg-gray-50 text-xs border border-gray-300 text-gray-700 font-medium">
          {expanded ? "Hide details" : "Show details"}
        </button>
        <button
          onClick={() => onEdit(m)}
          className="px-3 py-2 rounded-md bg-blue-50 hover:bg-blue-100 text-xs text-blue-700 border border-blue-200 font-semibold">
          Edit
        </button>
      </div>
    </div>
  );
}

function Field({ label, children, wide = false }) {
  return (
    <div className={wide ? "sm:col-span-2" : ""}>
      <div className="text-[10px] uppercase tracking-wider text-gray-500 font-semibold">{label}</div>
      <div className="text-gray-900 break-words">{children}</div>
    </div>
  );
}

// =========================================================
//                       List View
// =========================================================
function ListView({ meetings, onEdit }) {
  const [sortBy, setSortBy] = useState({ field: "meeting_date", dir: "desc" });

  const sorted = useMemo(() => {
    const rows = [...meetings];
    const dir = sortBy.dir === "asc" ? 1 : -1;
    rows.sort((a,b) => {
      const va = a[sortBy.field] ?? "";
      const vb = b[sortBy.field] ?? "";
      if (va < vb) return -1 * dir;
      if (va > vb) return 1 * dir;
      return 0;
    });
    return rows;
  }, [meetings, sortBy]);

  const toggleSort = (field) => {
    setSortBy(s => s.field === field ? { field, dir: s.dir === "asc" ? "desc" : "asc" } : { field, dir: "asc" });
  };

  const SortHeader = ({ field, children }) => (
    <th onClick={() => toggleSort(field)} className="px-3 py-2 text-left text-[11px] font-semibold uppercase tracking-wider text-gray-600 cursor-pointer hover:text-gray-900 select-none whitespace-nowrap bg-gray-50">
      {children} {sortBy.field === field && (sortBy.dir === "asc" ? "▲" : "▼")}
    </th>
  );

  return (
    <section>
      <div className="overflow-x-auto scrollbar-thin rounded-xl border border-gray-200 bg-white shadow-card">
        <table className="w-full text-sm">
          <thead>
            <tr className="border-b border-gray-200">
              <SortHeader field="meeting_date">Date</SortHeader>
              <SortHeader field="timing">Time</SortHeader>
              <SortHeader field="customer_name">Customer</SortHeader>
              <SortHeader field="mobile_number">Mobile</SortHeader>
              <SortHeader field="area">Area</SortHeader>
              <SortHeader field="windows">Windows</SortHeader>
              <SortHeader field="designer_name">Designer</SortHeader>
              <SortHeader field="support_name">Support</SortHeader>
              <SortHeader field="meeting_type">Type</SortHeader>
              <SortHeader field="status">Status</SortHeader>
              <SortHeader field="scheduled_by">Scheduled by</SortHeader>
              <SortHeader field="recording">Rec.</SortHeader>
              <th className="px-3 py-2 text-left text-[11px] font-semibold uppercase tracking-wider text-gray-600 bg-gray-50">Reason</th>
              <th className="px-3 py-2 text-left text-[11px] font-semibold uppercase tracking-wider text-gray-600 bg-gray-50">Remarks</th>
              <th className="px-3 py-2 text-left text-[11px] font-semibold uppercase tracking-wider text-gray-600 bg-gray-50">Sales Journal</th>
              <th className="px-3 py-2 bg-gray-50"></th>
            </tr>
          </thead>
          <tbody className="divide-y divide-gray-100">
            {sorted.map(m => {
              const c = meetingColor(m.meeting_type);
              return (
                <tr key={m.id} className="hover:bg-gray-50">
                  <td className="px-3 py-2 whitespace-nowrap font-mono text-gray-700">{m.meeting_date}</td>
                  <td className="px-3 py-2 whitespace-nowrap text-gray-700">{m.timing || "—"}</td>
                  <td className="px-3 py-2 whitespace-nowrap font-medium text-gray-900">{m.customer_name || "—"}</td>
                  <td className="px-3 py-2 whitespace-nowrap text-gray-600">{m.mobile_number || "—"}</td>
                  <td className="px-3 py-2 text-gray-700">{m.area || "—"}</td>
                  <td className="px-3 py-2 text-center text-gray-700">{m.windows ?? "—"}</td>
                  <td className="px-3 py-2 whitespace-nowrap text-gray-700">{m.designer_name || "—"}</td>
                  <td className="px-3 py-2 whitespace-nowrap text-gray-700">{m.support_name || "—"}</td>
                  <td className="px-3 py-2 whitespace-nowrap">
                    <span className={`${c.chipBg} ${c.text} rounded px-2 py-0.5 text-xs font-semibold`}>{m.meeting_type || "—"}</span>
                  </td>
                  <td className="px-3 py-2 whitespace-nowrap text-gray-700">{m.status || "—"}</td>
                  <td className="px-3 py-2 whitespace-nowrap text-gray-700">{m.scheduled_by || "—"}</td>
                  <td className="px-3 py-2 whitespace-nowrap text-gray-700">{m.recording || "—"}</td>
                  <td className="px-3 py-2 max-w-[200px] truncate text-gray-700" title={m.recording_reason || ""}>{m.recording_reason || "—"}</td>
                  <td className="px-3 py-2 max-w-[200px] truncate text-gray-700" title={m.remarks || ""}>{m.remarks || "—"}</td>
                  <td className="px-3 py-2 max-w-[200px] truncate text-gray-700" title={m.sj || ""}>{m.sj || "—"}</td>
                  <td className="px-3 py-2 whitespace-nowrap">
                    <button onClick={() => onEdit(m)} className="text-blue-600 hover:text-blue-800 text-xs font-semibold">Edit</button>
                  </td>
                </tr>
              );
            })}
            {sorted.length === 0 && (
              <tr><td colSpan="16" className="text-center py-8 text-gray-500">No meetings match these filters.</td></tr>
            )}
          </tbody>
        </table>
      </div>
    </section>
  );
}

// =========================================================
//                       Edit Modal
// =========================================================
function EditModal({ record, onClose, onSave, onDelete }) {
  const [form, setForm] = useState({
    meeting_date: record.meeting_date || "",
    customer_name: record.customer_name || "",
    mobile_number: record.mobile_number || "",
    area: record.area || "",
    windows: record.windows ?? "",
    designer_name: record.designer_name || "",
    support_name: record.support_name || "",
    meeting_type: record.meeting_type || "1st Meeting",
    timing: record.timing || "",
    status: record.status || "",
    scheduled_by: record.scheduled_by || "",
    recording: record.recording || "",
    recording_reason: record.recording_reason || "",
    remarks: record.remarks || "",
    sj: record.sj || "",
  });
  const [saving, setSaving] = useState(false);
  const [errorMsg, setErrorMsg] = useState(null);

  const set = (k) => (e) => setForm(f => ({ ...f, [k]: e.target.value }));

  const submit = async (e) => {
    if (e) e.preventDefault();
    if (saving) return;
    setErrorMsg(null);
    setSaving(true);
    try {
      await onSave({ ...record, ...form });
      // If onSave succeeds it will close the modal via setEditing(null)
    } catch (err) {
      setErrorMsg(err?.message || "Could not save. Please try again.");
      setSaving(false);
    }
  };

  const handleDeleteClick = async () => {
    setErrorMsg(null);
    try {
      await onDelete(record.id);
    } catch (err) {
      setErrorMsg(err?.message || "Delete failed.");
    }
  };

  return (
    <div className="fixed inset-0 z-50 bg-gray-900/50 flex items-stretch sm:items-center justify-center sm:p-4" onClick={onClose}>
      <form
        onSubmit={submit}
        noValidate
        className="bg-white border border-gray-200 sm:rounded-xl w-full max-w-3xl h-full sm:h-auto sm:max-h-[92vh] overflow-y-auto overflow-x-hidden scrollbar-thin shadow-card flex flex-col"
        onClick={e => e.stopPropagation()}>

        {/* STICKY TOP — always visible action bar with Save (works even with keyboard open) */}
        <div className="sticky top-0 bg-white border-b border-gray-200 px-3 sm:px-4 py-3 flex items-center justify-between gap-2 z-10">
          <div className="flex items-center gap-2 min-w-0 flex-1">
            <button
              type="button"
              onClick={onClose}
              aria-label="Close"
              className="w-9 h-9 rounded-full hover:bg-gray-100 text-gray-500 hover:text-gray-900 text-2xl leading-none inline-flex items-center justify-center shrink-0">
              ×
            </button>
            <h3 className="text-base sm:text-lg font-semibold text-gray-900 truncate">
              {record.id ? "Edit Meeting" : "New Meeting"}
            </h3>
          </div>
          <button
            type="submit"
            disabled={saving}
            className="px-5 py-2 rounded-full bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold shadow-soft disabled:opacity-60 disabled:cursor-not-allowed whitespace-nowrap shrink-0 min-h-[40px]">
            {saving ? "Saving…" : "Save"}
          </button>
        </div>

        {/* Inline error banner (replaces alert() — iOS Safari-friendly) */}
        {errorMsg && (
          <div className="mx-3 sm:mx-4 mt-3 p-3 rounded-lg bg-red-50 border border-red-200 text-red-800 text-sm">
            <div className="font-semibold mb-0.5">Couldn't save</div>
            <div className="break-words">{errorMsg}</div>
          </div>
        )}

        {/* Form fields — single column on mobile, two on sm+. min-w-0 prevents grid overflow. */}
        <div className="p-3 sm:p-5 grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4 flex-1">
          <Input label="Date *" type="date" value={form.meeting_date} onChange={set("meeting_date")} required />
          <Input label="Timing" placeholder="e.g. 11:30 AM" value={form.timing} onChange={set("timing")} />
          <Input label="Customer Name" value={form.customer_name} onChange={set("customer_name")} />
          <Input label="Mobile Number" type="tel" inputMode="tel" value={form.mobile_number} onChange={set("mobile_number")} />
          <Input label="Area" value={form.area} onChange={set("area")} />
          <Input label="# Windows" type="number" inputMode="numeric" min="0" value={form.windows} onChange={set("windows")} />
          <Input label="Designer Name" value={form.designer_name} onChange={set("designer_name")} />
          <Input label="Support Name" value={form.support_name} onChange={set("support_name")} />
          <Select label="Meeting Type" value={form.meeting_type} onChange={set("meeting_type")} options={MEETING_TYPES} />
          <Select label="Status" value={form.status} onChange={set("status")} options={STATUSES} allowEmpty />
          <Input label="Scheduled by" value={form.scheduled_by} onChange={set("scheduled_by")} />
          <Select label="Meeting Recording" value={form.recording} onChange={set("recording")} options={RECORDING_OPTS} allowEmpty />
          <Textarea label="Reason for not submitting recording" value={form.recording_reason} onChange={set("recording_reason")} wide />
          <Textarea label="Remarks" value={form.remarks} onChange={set("remarks")} wide />
          <Textarea label="Sales Journal (SJ)" value={form.sj} onChange={set("sj")} wide />
        </div>

        {/* STICKY BOTTOM — secondary action bar (mobile-friendly: full-width buttons, large taps) */}
        <div className="sticky bottom-0 bg-white border-t border-gray-200 px-3 sm:px-4 py-3 pb-safe flex flex-col-reverse sm:flex-row sm:justify-between sm:items-center gap-2">
          <div className="sm:flex-shrink-0">
            {record.id && (
              <button
                type="button"
                onClick={handleDeleteClick}
                className="w-full sm:w-auto px-4 py-3 rounded-lg bg-red-600 hover:bg-red-700 text-white text-sm font-semibold min-h-[44px]">
                Delete
              </button>
            )}
          </div>
          <div className="flex flex-col-reverse sm:flex-row gap-2 sm:items-center">
            <button
              type="button"
              onClick={onClose}
              className="w-full sm:w-auto px-4 py-3 rounded-lg bg-white hover:bg-gray-50 text-sm border border-gray-300 text-gray-700 font-medium min-h-[44px]">
              Cancel
            </button>
            <button
              type="submit"
              disabled={saving}
              className="w-full sm:w-auto px-5 py-3 rounded-lg bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold shadow-soft disabled:opacity-60 disabled:cursor-not-allowed min-h-[44px]">
              {saving ? "Saving…" : "Save Meeting"}
            </button>
          </div>
        </div>
      </form>
    </div>
  );
}

function Input({ label, wide, ...rest }) {
  return (
    <label className={`block min-w-0 ${wide ? "sm:col-span-2" : ""}`}>
      <span className="text-xs uppercase tracking-wider text-gray-500 font-semibold">{label}</span>
      <input {...rest} className="mt-1 w-full bg-white border border-gray-300 rounded-md px-3 py-2.5 text-base sm:text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500" />
    </label>
  );
}
function Textarea({ label, wide, ...rest }) {
  return (
    <label className={`block min-w-0 ${wide ? "sm:col-span-2" : ""}`}>
      <span className="text-xs uppercase tracking-wider text-gray-500 font-semibold">{label}</span>
      <textarea {...rest} rows="2" className="mt-1 w-full bg-white border border-gray-300 rounded-md px-3 py-2.5 text-base sm:text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500" />
    </label>
  );
}
function Select({ label, value, onChange, options, allowEmpty, wide }) {
  return (
    <label className={`block min-w-0 ${wide ? "sm:col-span-2" : ""}`}>
      <span className="text-xs uppercase tracking-wider text-gray-500 font-semibold">{label}</span>
      <select value={value} onChange={onChange} className="mt-1 w-full bg-white border border-gray-300 rounded-md px-3 py-2.5 text-base sm:text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
        {allowEmpty && <option value="">— select —</option>}
        {options.map(o => <option key={o} value={o}>{o}</option>)}
      </select>
    </label>
  );
}

// =========================================================
//                        Footer
// =========================================================
function Footer() {
  return (
    <footer className="mt-12 py-6 text-center text-xs text-gray-500 border-t border-gray-200 bg-white">
      <Logo className="h-7 mx-auto mb-2 opacity-70" />
      <div>D'Moksha Homes · Meetings Calendar</div>
    </footer>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
